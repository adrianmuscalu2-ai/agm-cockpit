services:
  postgres:
    image: postgres:16-alpine
    container_name: agm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agm
      POSTGRES_PASSWORD: agm
      POSTGRES_DB: agm
    ports:
      - "5432:5432"
    volumes:
      - agm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agm -d agm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agm_postgres_data:
